<div id="tcpLoginMount">
  <div id="tcpLoginApp">
    <style>
      #tcpLoginApp,
      #tcpLoginApp *{
        box-sizing:border-box;
      }

      #tcpLoginApp{
        position:fixed;
        inset:0;
        width:100vw;
        height:100vh;
        z-index:2147483647;
        font-family:Poppins,Arial,sans-serif;
        color:#F5F1E8;
        overflow:hidden;
        background:#070707;
      }

      #tcpLoginApp .bg{
        position:absolute;
        inset:0;
        background:
          linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.78)),
          url("https://img1.wsimg.com/isteam/ip/228f7ec4-d3e5-44c1-aeb1-3954d9b015b2/Elegant%20modern%20entrance%20at%20dusk.png") center center / cover no-repeat;
      }

      #tcpLoginApp .overlay{
        position:absolute;
        inset:0;
        background:
          radial-gradient(circle at left center, rgba(0,0,0,.16), rgba(0,0,0,0) 35%),
          linear-gradient(90deg, rgba(7,7,7,.52) 0%, rgba(7,7,7,.20) 42%, rgba(7,7,7,.46) 100%);
      }

      #tcpLoginApp .wrap{
        position:relative;
        z-index:2;
        width:100%;
        height:100%;
        display:grid;
        grid-template-columns:minmax(0,1fr) 460px;
        align-items:center;
        gap:40px;
        padding:48px 64px;
      }

      #tcpLoginApp .hero{
        display:flex;
        flex-direction:column;
        justify-content:center;
        max-width:780px;
      }

      #tcpLoginApp .pill{
        display:inline-flex;
        align-items:center;
        width:max-content;
        color:#C6A75E;
        border:1px solid rgba(198,167,94,.4);
        background:rgba(198,167,94,.08);
        padding:8px 14px;
        border-radius:999px;
        margin-bottom:20px;
        font-size:12px;
        font-weight:700;
        letter-spacing:.08em;
        text-transform:uppercase;
      }

      #tcpLoginApp .hero h1{
        margin:0 0 22px 0;
        font-size:68px;
        line-height:.98;
        font-weight:800;
        letter-spacing:-.04em;
        color:#fff;
        max-width:780px;
      }

      #tcpLoginApp .hero h1 span{
        color:#C6A75E;
      }

      #tcpLoginApp .hero p{
        margin:0;
        color:rgba(255,255,255,.82);
        font-size:18px;
        line-height:1.65;
        max-width:650px;
      }

      #tcpLoginApp .card{
        background:rgba(12,12,12,.88);
        border-radius:24px;
        padding:38px;
        border:1px solid rgba(198,167,94,.18);
        box-shadow:0 24px 70px rgba(0,0,0,.55);
        backdrop-filter:blur(10px);
      }

      #tcpLoginApp .logo{
        height:62px;
        margin:0 auto 18px;
        display:block;
        filter:drop-shadow(0 0 18px rgba(198,167,94,.22));
      }

      #tcpLoginApp .title{
        text-align:center;
        font-size:30px;
        line-height:1.05;
        font-weight:800;
        margin:0;
      }

      #tcpLoginApp .subtitle{
        text-align:center;
        color:rgba(255,255,255,.62);
        margin:10px 0 24px;
        font-size:15px;
      }

      #tcpLoginApp .inputWrap{
        position:relative;
      }

      #tcpLoginApp .input{
        width:100%;
        padding:14px 14px;
        margin-bottom:14px;
        background:#0b0b0b;
        border:1px solid rgba(198,167,94,.15);
        border-radius:12px;
        color:#fff;
        outline:none;
      }

      #tcpLoginApp .input:focus{
        border-color:rgba(198,167,94,.42);
        box-shadow:0 0 0 4px rgba(198,167,94,.08);
      }

      #tcpLoginApp .showBtn{
        position:absolute;
        right:10px;
        top:11px;
        background:none;
        border:none;
        color:#C6A75E;
        cursor:pointer;
        font-size:12px;
        font-weight:700;
      }

      #tcpLoginApp .meta{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
        margin:2px 0 16px;
        font-size:13px;
      }

      #tcpLoginApp .meta label{
        display:flex;
        gap:6px;
        align-items:center;
      }

      #tcpLoginApp .meta input[type="checkbox"]{
        accent-color:#C6A75E;
      }

      #tcpLoginApp .meta a{
        color:#C6A75E;
        text-decoration:none;
        cursor:pointer;
      }

      #tcpLoginApp .btn{
        width:100%;
        padding:16px;
        background:#C6A75E;
        color:#111;
        border:none;
        border-radius:12px;
        font-weight:800;
        cursor:pointer;
      }

      #tcpLoginApp .btn:hover{
        opacity:.92;
      }

      #tcpLoginApp .status{
        text-align:center;
        margin-top:10px;
        min-height:20px;
        font-size:13px;
      }

      #tcpLoginApp .foot{
        text-align:center;
        margin-top:18px;
        font-size:14px;
        color:rgba(255,255,255,.72);
      }

      #tcpLoginApp .foot a{
        color:#C6A75E;
        text-decoration:none;
      }

      @media (max-width: 980px){
        #tcpLoginApp .wrap{
          grid-template-columns:1fr;
          gap:24px;
          padding:22px;
          overflow:auto;
        }

        #tcpLoginApp .hero h1{
          font-size:44px;
        }

        #tcpLoginApp .card{
          max-width:520px;
          width:100%;
          margin:0 auto;
        }
      }
    </style>

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="wrap">
      <div class="hero">
        <div class="pill">BUILT FOR AUSSIE TRADIES</div>

        <h1>
          Price fencing and walls <span>fast, accurate, profitable</span>
        </h1>

        <p>
          Access live quoting tools for fencing, retaining walls and block walls.
          Quote faster, protect margin, win more work.
        </p>
      </div>

      <div class="card">
        <img class="logo"
          src="https://img1.wsimg.com/isteam/ip/228f7ec4-d3e5-44c1-aeb1-3954d9b015b2/Tradiecalcpro.png/:/rs=h:175,m"
          alt="Tradie Calculator Pro">

        <div class="title">Welcome back</div>
        <div class="subtitle">Login to access your calculators</div>

        <input id="email" class="input" type="email" placeholder="Email">

        <div class="inputWrap">
          <input id="password" class="input" type="password" placeholder="Password">
          <button class="showBtn" type="button" onclick="togglePw()">Show</button>
        </div>

        <div class="meta">
          <label>
            <input type="checkbox" id="remember" checked>
            Keep me logged in
          </label>
          <a href="#" onclick="resetPw(); return false;">Forgot?</a>
        </div>

        <button class="btn" type="button" onclick="login()">Log in</button>

        <div id="status" class="status"></div>

        <div class="foot">
          No account?
          <a href="signup.html">Start free trial</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
(function () {
  const mount = document.getElementById("tcpLoginMount");
  const app = document.getElementById("tcpLoginApp");

  if (app && app.parentNode !== document.body) {
    document.body.appendChild(app);
    if (mount) mount.remove();
  }

  document.documentElement.style.margin = "0";
  document.documentElement.style.padding = "0";
  document.documentElement.style.width = "100%";
  document.documentElement.style.height = "100%";
  document.documentElement.style.overflow = "hidden";

  document.body.style.margin = "0";
  document.body.style.padding = "0";
  document.body.style.width = "100%";
  document.body.style.height = "100%";
  document.body.style.overflow = "hidden";
  document.body.style.background = "#070707";

  Array.from(document.body.children).forEach(function (el) {
    if (el.id !== "tcpLoginApp") {
      el.style.display = "none";
    }
  });

  const firebaseConfig = {
    apiKey: "AIzaSyC9UlL6WJ5JHL5-OJgAhSocxXREFMYgCLQ",
    authDomain: "tradie-calculator-pro.firebaseapp.com",
    projectId: "tradie-calculator-pro"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  window.togglePw = function(){
    const pw = document.getElementById("password");
    pw.type = pw.type === "password" ? "text" : "password";
  };

  function setStatus(msg, color){
    const el = document.getElementById("status");
    el.innerText = msg;
    el.style.color = color;
  }

  window.login = function(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const remember = document.getElementById("remember").checked;

    if(!email){
      setStatus("Enter your email", "#ff6b6b");
      return;
    }

    if(!password){
      setStatus("Enter your password", "#ff6b6b");
      return;
    }

    const persistence = remember
      ? firebase.auth.Auth.Persistence.LOCAL
      : firebase.auth.Auth.Persistence.SESSION;

    firebase.auth().setPersistence(persistence)
      .then(() => firebase.auth().signInWithEmailAndPassword(email, password))
      .then(() => {
        window.location.href = "/tradie-calculator-pro";
      })
      .catch(err => {
        setStatus(err.message, "#ff6b6b");
      });
  };

  window.resetPw = function(){
    const email = document.getElementById("email").value.trim();

    if(!email){
      setStatus("Enter your email first", "#ff6b6b");
      return;
    }

    firebase.auth().sendPasswordResetEmail(email)
      .then(() => {
        setStatus("Reset email sent", "#66ff99");
      })
      .catch(err => {
        setStatus(err.message, "#ff6b6b");
      });
  };
})();
</script>
